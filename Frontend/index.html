<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>InterNest</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="container">

    <h1>Welcome To InterNest</h1>

    <form id="form">

        <label>Skill:</label>
        <input
        id="skill"
        type="text"
        placeholder="Python">

        <label>Sector:</label>
        <input
        id="sector"
        type="text"
        placeholder="AI">

        <label>Location:</label>
        <input
        id="location"
        type="text"
        placeholder="Delhi">


        <button type="submit">

            Find Internships

        </button>

    </form>


    <div class="result">

        <h2>
        Recommended Internships
        </h2>

        <div id="output">

            No recommendations yet

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
